<style>
    .titleBox {margin-top: 50px;}
    .titleBox h2 {font-size: 24px;}
    .titleBox p {color: var(--gray-500); margin: 0;}
    .portfolioList { display:flex; flex-wrap:wrap; gap:15px; margin-top: 30px;}
    .portfolioList li {width: calc(50% - 7.5px); box-shadow:0 4px 20px rgba(15,23,42,0.04); border-radius: 10px; border: 1px solid var(--gray-300); overflow: hidden;}
    .portfolioList li .thumb {width:100%; height: 150px; overflow:hidden; border-top-left-radius:10px; border-top-right-radius:10px;}
    .portfolioList li .thumb img {width:100%; height:100%; transition:transform .4s ease;}
    .portfolioList li:hover .thumb img { transform:scale(1.03);}
    .portfolioList li .info { position: relative; padding: 15px; border-bottom-left-radius:10px; border-bottom-right-radius:10px; background-color: var(--white);}
    .portfolioList li .info::after {content: ""; position: absolute; width: 18px; height: 18px; right: 5px; bottom: 18px; background: url(./images/icons/icon_arrowdown.svg) no-repeat center/contain; transform: rotate(-90deg)}
    .portfolioList li .info span {display:block; font-size: 12px; color: var(--gray-500); margin-bottom: 5px;}
    .portfolioList li .info strong {font-size: 16px;}

    @media (min-width: 600px) {
        .portfolioList li {width: calc(33.333% - 10px);}
    }
    @media (min-width: 1000px) {
        .portfolioList li {width: calc(25% - 11.25px);}
    }
</style>
</head>
