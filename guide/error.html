<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/main.css">
    <title>에러페이지</title>
</head>
<body>
    <div class="wrapper PC Windows" id="wrapper" path="error"> 
        <div class="container">
            <main>
                <div class="inner">
                    <div class="errorBox">
                        <div class="icon"></div>
                        <h2 class="title">오류 <span>ERROR</span></h2>
                        <div class="message">
                        접속 경로가 잘못되었습니다.<br>
                        URL을 다시 확인해 주세요.
                        </div>
                        <div class="notice">
                        자동차 정보 서비스 페이지를 방문해 주셔서 감사합니다.<br>
                        견적서나 가격표, 카탈로그, 사고이력정보, 출시사양정보 등<br>
                        다양한 정보를 고객님께 전달해 드립니다.
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
